<div class="container mt-4">
  <div class="card" style="width: 18rem;">
    <div class="card-header">Register System</div>
    <div class="card-body">
      <form #registerForm="ngForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="username" class="form-label">Username:</label>
          <input type="text" class="form-control" id="username" [(ngModel)]="username" name="username" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password:</label>
          <input type="password" class="form-control" id="password" [(ngModel)]="password" name="password" required>
        </div>
        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirm Password:</label>
          <input type="password" class="form-control" id="confirmPassword" [(ngModel)]="confirmPassword"
            name="confirmPassword" required>
        </div>

        <div *ngIf="error" class="alert alert-danger" role="alert">{{error}}</div>
        <div *ngIf="success" class="alert alert-success" role="alert">{{success}}</div>

        <div class="mt-3 d-flex justify-content-between align-items-center">
          <button type="submit" class="btn btn-primary" [disabled]="registerForm.invalid">Register</button>
          <a routerLink="/login" class="text-decoration-none">Back to Login</a>
        </div>
      </form>
    </div>
  </div>
</div>
