<div class="products-page">
  <div class="page-header">
    <h1 class="page-title">Our Collection</h1>
    <button type="button" class="cart-link" (click)="goToCart()"> Shopping cart <span *ngIf="(cartService.cartCount$ | async) as count">{{ count }}</span></button>
  </div>

  <div *ngIf="loading" class="loading-wrap">
    <div class="spinner"></div>
    <p>Loading products...</p>
  </div>

  <div *ngIf="!loading && errorMsg" class="error-msg">
    ⚠️ {{ errorMsg }}
  </div>

  <div class="product-grid" *ngIf="!loading && products.length > 0">
    <div class="product-card" *ngFor="let product of products">
      <div class="product-img-wrap">
        <img [src]="getImageUrl(product.image)" [alt]="product.name" loading="lazy" (error)="onImageError($event)" />
      </div>

      <div class="product-body">
        <h3 class="product-name">{{ product.name }}</h3>
        <div class="stars">☆☆☆☆☆</div>
        <p class="product-price">${{ product.price.toFixed(2) }}</p>

        <div class="card-actions">
          <button
            class="btn-add"
            [class.added]="isAdded(product._id)"
            [disabled]="isAdding(product._id)"
            (click)="addToCart(product)"
          >
            <span *ngIf="!isAdded(product._id) && !isAdding(product._id)">ADD TO CART</span>
            <span *ngIf="isAdding(product._id)">Adding...</span>
            <span *ngIf="isAdded(product._id)">✓ Added!</span>
          </button>
          <button class="btn-icon" title="Compare">⊞</button>
          <button class="btn-icon" title="Wishlist">♡</button>
        </div>
      </div>
    </div>
  </div>
</div>
