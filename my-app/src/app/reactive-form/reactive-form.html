<div class="container mt-4">
  <form [formGroup]="regForm" (ngSubmit)="submitForm()">

    <h3 class="text-center mb-4">ĐĂNG KÝ KHÓA HỌC</h3>

    <div class="mb-3">
      <label>Tên:</label>
      <input type="text" class="form-control" formControlName="name">
      <small class="text-danger"
        *ngIf="regForm.controls['name'].invalid && regForm.controls['name'].touched">
        Tên phải có ít nhất 3 ký tự
      </small>
    </div>

    <div class="mb-3">
      <label>Email:</label>
      <input type="email" class="form-control" formControlName="email">
      <small class="text-danger"
        *ngIf="regForm.controls['email'].invalid && regForm.controls['email'].touched">
        Email không hợp lệ
      </small>
    </div>

    <div class="mb-3">
      <label>Mật khẩu:</label>
      <input type="password" class="form-control" formControlName="password">
    </div>

    <div class="mb-3">
      <label>Nhập lại mật khẩu:</label>
      <input type="password" class="form-control" formControlName="confirmPass">
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-primary" type="submit" [disabled]="regForm.invalid">
        Đăng ký
      </button>

      <button type="button" class="btn btn-secondary"
        (click)="setDefaultValues()">
        Default Values
      </button>
    </div>

  </form>

  <p class="mt-3">{{ regForm.value | json }}</p>
</div>
