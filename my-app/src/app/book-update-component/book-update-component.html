<p>book-update works!</p>
<p class="error-message">{{ errMessage }}</p>
<table>
  <tr>
    <td>Book Id:</td>
    <td>
      <input
        type="text"
        class="form-control"
        #name="ngModel"
        name="BookId"
        id="BookId"
        placeholder="Enter Book Id"
        [(ngModel)]="book.BookId"
      />
    </td>
  </tr>
  <tr>
    <td>Book Name:</td>
    <td>
      <input
        type="text"
        class="form-control"
        #name="ngModel"
        name="BookName"
        id="BookName"
        placeholder="Enter Book Name"
        [(ngModel)]="book.BookName"
      />
    </td>
  </tr>
  <tr>
    <td>Price:</td>
    <td>
      <input
        type="text"
        class="form-control"
        #name="ngModel"
        name="BookPrice"
        id="BookPrice"
        placeholder="Enter Price"
        [(ngModel)]="book.Price"
      />
    </td>
  </tr>
  <tr class="button-row">
    <td colspan="2">
      <button (click)="putBook()">Update</button>
    </td>
  </tr>
</table>
<table>
  <tr>
    <th>BookId</th>
    <th>BookName</th>
    <th>Price</th>
    <th>Image</th>
  </tr>
  <tbody>
    <tr *ngFor="let book of books">
      <td>{{ book.BookId }}</td>
      <td>{{ book.BookName }}</td>
      <td>{{ book.Price }}</td>
      <td>
        <img src="http://localhost:3000/static/images/{{ book.Image }}" width="100px" height="100px" />
      </td>
    </tr>
  </tbody>
</table>
