<div class="ex58-client">
  <h1 class="page-title">Fashion</h1>
  <div class="search-bar">
    <input
      type="text"
      [(ngModel)]="filterStyle"
      placeholder="Search by Style"
      (keyup.enter)="search()"
    />
    <button type="button" class="btn-search" (click)="search()">SEARCH</button>
  </div>

  <div *ngIf="loading" class="loading-wrap">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>
  <div *ngIf="error" class="error-msg">{{ error }}</div>

  <div *ngIf="!loading && !error" class="grid-by-style">
    <ng-container *ngFor="let group of groupedByStyle">
      <h2 class="style-title">{{ group.style || 'Other' }}</h2>
      <div class="card-grid">
        <div
          *ngFor="let item of group.items"
          class="card"
          (click)="goToDetail(item._id!)"
        >
          <div class="card-thumb" *ngIf="item.thumbnail">
            <img [src]="getThumbnailUrl(item.thumbnail)" alt="" (error)="$any($event).target.style.display='none'" />
          </div>
          <div class="card-thumb no-img" *ngIf="!item.thumbnail">No image</div>
          <h3 class="card-title">{{ item.title || '—' }}</h3>
        </div>
      </div>
    </ng-container>
  </div>

  <div *ngIf="!loading && !error && all.length === 0" class="empty">
    <p>No fashion items found.</p>
  </div>
</div>
