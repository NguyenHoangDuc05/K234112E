<div class="ex58-detail-root">
  <div class="ex58-detail-page">
    <div *ngIf="loading" class="loading-wrap">
      <div class="spinner"></div>
      <p>Loading...</p>
    </div>

    <div *ngIf="!loading && item" class="detail">
    <div class="header">
      <h1 class="title">{{ item.title }}</h1>
      <p class="meta">Style: {{ item.style || '—' }} · {{ item.creationDate | date:'medium' }}</p>
    </div>
    <div *ngIf="item.thumbnail" class="thumb-wrap">
      <img [src]="getThumbnailUrl(item.thumbnail)" alt="" class="thumb" onerror="this.style.display='none'" />
    </div>
    <div *ngIf="item.details" class="details-html" [innerHTML]="getDetailsHtml()"></div>
    <div *ngIf="!item.details" class="no-details">No details.</div>
    <div class="actions">
      <button type="button" class="btn-edit" (click)="edit()">Edit</button>
      <button type="button" class="btn-back" (click)="back()">Back to list</button>
    </div>
    </div>
  </div>

  <!-- Error modal (outside ex58-detail-page so backdrop covers full viewport) -->
  <div *ngIf="errorModalMessage" class="ex58-modal-backdrop" (click)="dismissErrorModal()">
    <div class="ex58-modal" (click)="$event.stopPropagation()">
      <h3 class="ex58-modal-title">Error</h3>
      <p class="ex58-modal-text">{{ errorModalMessage }}</p>
      <div class="ex58-modal-actions">
        <button type="button" class="ex58-modal-btn ex58-modal-btn-ok" (click)="dismissErrorModal()">OK</button>
      </div>
    </div>
  </div>
</div>
