<div class="page-center">
  <p>book-detail works!</p>
  <p class="error-message">{{errMessage}}</p>
  <div class="search-container">
    <span class="form-label">Book Id:</span> <input type="text" #bookId>
    <button (click)="searchBook(bookId.value)">Search</button>
  </div>
  <table *ngIf="book">
    <tr>
        <td>Book Id:</td>
        <td>{{book.BookId}}</td>
    </tr>
    <tr>
        <td>Book Name:</td>
        <td>{{book.BookName}}</td>
    </tr>
    <tr>
        <td>Price:</td>
        <td>{{book.Price}} </td>
    </tr>
    <tr>
        <td colspan="2">
            <img src="http://localhost:3000/static/images/{{book.Image}}"/>
        </td>
    </tr>
  </table>
</div>
