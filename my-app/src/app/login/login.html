<div class="container mt-4">
  <div class="card" style="width: 18rem;">
    <div class="card-header">Login System</div>
    <div class="card-body">
      <form #loginForm="ngForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="name-reg" class="form-label">User Name:</label>
          <input type="text" class="form-control" id="name-reg" name="name" [(ngModel)]="username" required>
        </div>
        <div class="mb-3">
          <label for="password-reg" class="form-label">Password</label>
          <input type="password" class="form-control" id="password-reg" name="password" [(ngModel)]="password" required>
        </div>
        <div *ngIf="error" class="error" role="alert">{{ error }}</div>
        <div class="mt-3 d-flex justify-content-between align-items-center">
          <button type="submit" class="btn btn-primary" [disabled]="loginForm.invalid || loading">{{ loading ? 'Logging
            in...' : 'Login' }}</button>
          <a routerLink="/register" class="text-decoration-none">Create an account</a>
        </div>
      </form>
    </div>
  </div>
</div>
